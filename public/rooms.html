<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>房间 · 羽毛球匹配</title>
    <link rel="stylesheet" href="/mobile.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="topline">
          <div>
            <h1>房间</h1>
            <p class="subtitle">创建房间或按房间号加入</p>
          </div>
          <div id="userAction"></div>
        </div>
      </header>

      <section id="message" class="message"></section>

      <section class="grid desktop-two">
        <section class="stack">
          <form id="searchRoomForm" class="card compact-search">
            <div class="card-title">
              <h2>查找房间</h2>
            </div>
            <div class="row">
              <input name="q" placeholder="房间号或名称">
              <button type="submit">搜索</button>
            </div>
          </form>

          <section id="createRoomCard" class="card stack">
            <div class="card-title">
              <h2>创建房间</h2>
              <button id="toggleCreateRoomBtn" type="button" class="secondary">创建</button>
            </div>
            <form id="createRoomForm" class="stack hide">
              <label>
                房间名
                <input name="name" placeholder="留空自动生成">
              </label>
              <div class="two">
                <label>
                  场地数
                  <input name="courtCount" type="number" min="1" max="20" value="3">
                </label>
                <label>
                  在线上限
                  <input name="maxPeople" type="number" min="2" max="200" value="30">
                </label>
              </div>
              <div class="two">
                <label>
                  模式
                  <select name="mode">
                    <option value="free">自由匹配</option>
                    <option value="round">固定场次</option>
                  </select>
                </label>
                <label>
                  密码
                  <input name="password" type="password">
                </label>
              </div>
              <section id="venueCreateBox" class="stack hide">
                <label>
                  场地
                  <select id="venueSelect" name="venueId">
                    <option value="">普通房间，不绑定场地</option>
                  </select>
                </label>
                <p id="venueCreateMeta" class="meta"></p>
                <div id="venueRosterBox" class="stack hide">
                  <input id="registrationSearch" type="search" placeholder="搜索报名成员">
                  <div id="createRegistrationList" class="user-pick-grid"></div>
                </div>
              </section>
              <button type="submit">创建并进入</button>
            </form>
          </section>
        </section>

        <section class="card">
          <div class="card-title">
            <h2>可加入房间</h2>
            <button id="refreshRoomsBtn" type="button" class="secondary">刷新</button>
          </div>
          <div id="roomList" class="list"></div>
        </section>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/rooms.js"></script>
  </body>
</html>
