<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理 · 羽毛球匹配</title>
    <link rel="stylesheet" href="/mobile.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="topline">
          <div>
            <h1>管理</h1>
            <p class="subtitle">房间、用户和黑名单</p>
          </div>
          <div id="userAction"></div>
        </div>
      </header>

      <section id="message" class="message"></section>

      <section class="stack">
        <div class="segmented">
          <input id="adminRoomsActive" type="radio" name="roomStatusFilter" value="active" checked>
          <label for="adminRoomsActive">当前房间</label>
          <input id="adminRoomsDissolved" type="radio" name="roomStatusFilter" value="dissolved">
          <label for="adminRoomsDissolved">已解散</label>
        </div>
        <button id="refreshAdminBtn" type="button">刷新管理数据</button>

        <details id="announcementSection" class="card admin-fold" open>
          <summary>
            <h2>公告</h2>
          </summary>
          <div class="admin-fold-body">
            <form id="announcementForm" class="stack">
              <label>
                标题
                <input name="title" maxlength="120" placeholder="公告标题">
              </label>
              <label>
                内容
                <textarea name="body" maxlength="2000" rows="5" placeholder="需要让大家看到的信息"></textarea>
              </label>
              <label class="check-row">
                <input name="isActive" type="checkbox" checked>
                <span>显示公告</span>
              </label>
              <button type="submit">保存公告</button>
            </form>
          </div>
        </details>

        <details class="card admin-fold" open>
          <summary>
            <h2>场地</h2>
          </summary>
          <div class="admin-fold-body">
            <button id="toggleVenueFormBtn" type="button" class="secondary">添加场地</button>
            <form id="venueForm" class="stack hide">
              <label>
                场地名称
                <input name="name" required maxlength="120" placeholder="例如：市民中心 1-3 号场">
              </label>
              <div class="two">
                <label>
                  球场个数
                  <input name="courtCount" type="number" min="1" max="20" value="3">
                </label>
                <label>
                  位置链接
                  <input name="locationUrl" type="url" maxlength="500" placeholder="Google Maps 链接">
                </label>
              </div>
              <div class="two">
                <label>
                  开始时间
                  <input name="startsAt" type="datetime-local" required>
                </label>
                <label>
                  结束时间
                  <input name="endsAt" type="datetime-local" required>
                </label>
              </div>
              <button type="submit">保存场地</button>
            </form>
            <div id="venueList" class="list"></div>
          </div>
        </details>

        <details class="card admin-fold" open>
          <summary>
            <h2>房间</h2>
          </summary>
          <div class="admin-fold-body">
            <div id="adminRooms" class="list"></div>
          </div>
        </details>

        <details id="adminUsersSection" class="card admin-fold" open>
          <summary>
            <h2>用户</h2>
          </summary>
          <div class="admin-fold-body">
            <div class="stack">
              <input id="userSearchInput" type="search" placeholder="搜索昵称或用户名">
              <div class="two">
                <label>
                  性别
                  <select id="userGenderFilter">
                    <option value="all">全部</option>
                    <option value="male">男</option>
                    <option value="female">女</option>
                    <option value="other">其他</option>
                  </select>
                </label>
                <label>
                  等级
                  <select id="userLevelFilter">
                    <option value="all">全部</option>
                    <option value="1-3">1-3</option>
                    <option value="4-6">4-6</option>
                    <option value="7-10">7-10</option>
                  </select>
                </label>
              </div>
            </div>
            <div id="adminUsers" class="admin-user-grid"></div>
          </div>
        </details>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
