<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>比赛 · 羽毛球匹配</title>
    <link rel="stylesheet" href="/mobile.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="topline">
          <div>
            <h1 id="roomTitle">比赛</h1>
            <p id="roomMeta" class="subtitle">加载中...</p>
          </div>
          <div id="userAction"></div>
        </div>
      </header>

      <section id="message" class="message"></section>

      <section class="stack">
        <nav class="tabs">
          <button type="button" class="active" data-tab="matchPanel">匹配</button>
          <button type="button" data-tab="membersPanel">成员</button>
          <button type="button" data-tab="matchesPanel">比赛</button>
        </nav>

        <section id="matchPanel" class="tab-panel active">
          <section id="venueInfoCard" class="card hide"></section>
          <form id="stateForm" class="card stack">
            <div class="card-title">
              <h2>我的状态</h2>
            </div>
            <div id="statusControls" class="segmented">
              <input id="stateIdle" type="radio" name="playStatus" value="idle">
              <label for="stateIdle">空闲</label>
              <input id="stateWaiting" type="radio" name="playStatus" value="waiting">
              <label for="stateWaiting">等待</label>
              <input id="stateResting" type="radio" name="playStatus" value="resting">
              <label for="stateResting">休息</label>
              <input id="stateBusy" type="radio" name="playStatus" value="busy">
              <label for="stateBusy">忙碌</label>
            </div>
            <div>
              <p id="preferenceHint" class="meta">匹配偏好，可多选</p>
              <div id="preferenceChecks" class="check-grid"></div>
            </div>
            <button id="saveStateBtn" type="submit">保存状态</button>
          </form>

          <form id="freeMatchForm" class="card stack" data-mode-panel="free">
            <div class="card-title">
              <h2>自由匹配</h2>
            </div>
            <p class="meta">按我的匹配偏好加入匹配池；不参与匹配时不会被安排比赛。</p>
            <div id="freeMatchChecks" class="check-grid hide"></div>
            <button type="submit">参与匹配</button>
          </form>

          <div id="freeProposalList" class="list" data-mode-panel="free"></div>

          <form id="roundMatchForm" class="card stack" data-mode-panel="round">
            <div class="card-title">
              <h2>固定场次</h2>
            </div>
            <div id="courtModes" class="grid"></div>
            <button type="submit">发起本轮</button>
          </form>

          <button id="leaveRoomBtn" type="button" class="secondary">离开房间</button>
          <button id="dissolveRoomBtn" type="button" class="danger hide">解散房间</button>
        </section>

        <section id="membersPanel" class="tab-panel">
          <div class="card">
            <div class="card-title">
              <h2>成员</h2>
              <div class="row wrap">
                <span id="memberCount" class="pill"></span>
                <button id="toggleTemporaryMemberBtn" type="button" class="secondary hide">添加临时</button>
              </div>
            </div>
            <form id="temporaryMemberForm" class="stack hide">
              <div class="card-title">
                <h3>添加临时成员</h3>
                <div class="row wrap">
                  <span class="pill resting">默认密码 000000</span>
                  <button id="hideTemporaryMemberBtn" type="button" class="secondary">收起</button>
                </div>
              </div>
              <label>
                昵称
                <input name="displayName" required maxlength="80">
              </label>
              <div class="two">
                <label>
                  登录用户名
                  <input name="username" maxlength="20" placeholder="留空自动生成">
                </label>
                <label>
                  性别
                  <select name="gender">
                    <option value="male">男</option>
                    <option value="female">女</option>
                    <option value="other">其他</option>
                  </select>
                </label>
              </div>
              <div class="two">
                <label>
                  出生年份
                  <input name="birthYear" type="number" min="1930" max="2026">
                </label>
                <label>
                  技术等级
                  <input name="skillLevel" type="number" min="1" max="10" value="5">
                </label>
              </div>
              <label>
                初始积分
                <input name="rating" type="number" min="0" max="3000" value="1000">
              </label>
              <button type="submit">添加成员</button>
            </form>
            <form id="registrationForm" class="stack hide">
              <div class="card-title">
                <h3>添加报名成员</h3>
              </div>
              <div id="registeredRosterList" class="registration-roster"></div>
              <input id="roomRegistrationSearch" type="search" placeholder="搜索用户">
              <div id="roomRegistrationList" class="user-pick-grid"></div>
              <button type="submit">加入报名名单</button>
            </form>
            <div id="memberList" class="member-grid"></div>
          </div>
        </section>

        <section id="matchesPanel" class="tab-panel">
          <div class="card">
            <div class="card-title">
              <h2>比赛</h2>
              <button id="refreshRoomBtn" type="button" class="secondary">刷新</button>
            </div>
            <div class="match-filter">
              <label>
                日期
                <input id="matchDateFilter" type="date">
              </label>
              <button id="clearMatchDateBtn" type="button" class="secondary">全部</button>
            </div>
            <div id="matchList" class="list"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/common.js"></script>
    <script src="/room.js"></script>
  </body>
</html>
