<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 · 羽毛球匹配房间</title>
    <link rel="stylesheet" href="/mobile.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="topline">
          <div>
            <h1>羽毛球匹配</h1>
            <p class="subtitle">登录后创建或加入房间</p>
          </div>
        </div>
      </header>

      <section id="message" class="message"></section>

      <section class="stack">
        <form id="loginForm" class="card stack">
          <div class="card-title">
            <h2>登录</h2>
          </div>
          <label>
            用户名
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">登录</button>
        </form>

        <form id="registerForm" class="card stack">
          <div class="card-title">
            <h2>注册新用户</h2>
          </div>
          <div class="two">
            <label>
              用户名
              <input name="username" required>
            </label>
            <label>
              昵称
              <input name="displayName" required>
            </label>
          </div>
          <div class="two">
            <label>
              性别
              <select name="gender">
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="other">其他</option>
              </select>
            </label>
            <label>
              出生年份
              <input name="birthYear" type="number" min="1930" max="2026">
            </label>
          </div>
          <div class="two">
            <label>
              技术等级
              <input name="skillLevel" type="number" min="1" max="10" value="5">
            </label>
            <label>
              密码
              <input name="password" type="password" autocomplete="new-password" required>
            </label>
          </div>
          <button type="submit">注册并进入</button>
        </form>
      </section>
    </main>

    <script src="/common.js"></script>
    <script src="/login.js"></script>
  </body>
</html>
